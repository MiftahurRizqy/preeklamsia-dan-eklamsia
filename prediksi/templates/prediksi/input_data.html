{% extends "core/base.html" %}

{% block title %}Cek Risiko Preeklamsia{% endblock %}

{% block content %}
<style>
  .risk-wrapper {
    margin-top: 80px;
    margin-bottom: 80px;
  }

  .risk-card {
    background: radial-gradient(circle at top left, rgba(224, 242, 254, 0.8), transparent 55%),
      radial-gradient(circle at bottom right, rgba(240, 249, 255, 0.9), transparent 55%),
      #ffffff;
    border-radius: 24px;
    border: 1px solid rgba(186, 230, 253, 0.5);
    box-shadow: 0 20px 60px rgba(14, 165, 233, 0.15);
    backdrop-filter: blur(12px);
    transform: translateY(24px);
    opacity: 0;
    animation: cardIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    padding-bottom: 3rem;
  }

  .risk-subtitle {
    color: #475569;
    font-size: 0.95rem;
  }

  .pill-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 999px;
    background: rgba(224, 242, 254, 0.5);
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: #0284c7;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .form-label {
    color: #334155;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 8px;
  }

  .form-control,
  .form-select {
    background-color: #f8fafc;
    border: 1px solid #cbd5e1;
    color: #0f172a;
    padding: 12px 14px;
    border-radius: 12px;
    transition: all 0.2s ease;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
    background-color: #fff;
    transform: translateY(-1px);
  }

  .btn-blue-gradient {
    background-image: linear-gradient(135deg, #38bdf8, #0ea5e9);
    border: none;
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 14px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
    transition: all 0.3s ease;
  }

  .btn-blue-gradient:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(14, 165, 233, 0.5);
    background-image: linear-gradient(135deg, #0ea5e9, #0284c7);
    color: #ffffff;
  }

  @keyframes cardIn {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.98);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>

<div class="container risk-wrapper">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-xl-9">
      <div class="risk-card p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <span class="pill-tag">
              <i class="bi bi-heart-pulse-fill"></i>
              Cek Risiko
            </span>
          </div>
          <small class="risk-subtitle">Isi data klinis ibu hamil dengan lengkap untuk analisis yang lebih
            akurat.</small>
        </div>

        {% if error %}
        <div class="alert alert-danger" style="border-radius: 12px;">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'predict_result' %}">
          {% csrf_token %}

          <div class="row g-4 mt-1">
            <div class="col-md-4">
              <label for="usia" class="form-label">Usia Ibu (tahun)</label>
              <input type="number" step="1" min="10" max="60" class="form-control" id="usia" name="usia" required>
            </div>
            <div class="col-md-4">
              <label for="gravida" class="form-label">Gravida (Jml Hamil)</label>
              <input type="number" step="1" min="0" class="form-control" id="gravida" name="gravida" required>
            </div>
            <div class="col-md-4">
              <label for="para" class="form-label">Para (Jml Lahir)</label>
              <input type="number" step="1" min="0" class="form-control" id="para" name="para" required>
            </div>
            <div class="col-md-4">
              <label for="abortus" class="form-label">Abortus (Jml Keguguran)</label>
              <input type="number" step="1" min="0" class="form-control" id="abortus" name="abortus" required>
            </div>

            <div class="col-md-4">
              <label for="usia_kehamilan" class="form-label">Usia Kehamilan (minggu)</label>
              <input type="number" step="1" min="1" max="42" class="form-control" id="usia_kehamilan"
                name="usia_kehamilan" required>
            </div>
            <div class="col-md-4">
              <label for="tinggi_badan" class="form-label">Tinggi Badan (cm)</label>
              <input type="number" step="1" min="120" max="200" class="form-control" id="tinggi_badan"
                name="tinggi_badan" required>
            </div>
            <div class="col-md-4">
              <label for="berat_badan" class="form-label">Berat Badan (kg)</label>
              <input type="number" step="0.1" min="30" max="200" class="form-control" id="berat_badan"
                name="berat_badan" required>
            </div>

            <div class="col-md-4">
              <label for="sistolik" class="form-label">Tekanan Darah Sistolik (mmHg)</label>
              <input type="number" step="1" min="80" max="220" class="form-control" id="sistolik" name="sistolik"
                required>
            </div>
            <div class="col-md-4">
              <label for="diastolik" class="form-label">Tekanan Darah Diastolik (mmHg)</label>
              <input type="number" step="1" min="40" max="140" class="form-control" id="diastolik" name="diastolik"
                required>
            </div>

            <div class="col-md-4">
              <label for="hemoglobin" class="form-label">Kadar Hemoglobin (g/dL)</label>
              <input type="number" step="0.1" min="5" max="20" class="form-control" id="hemoglobin" name="hemoglobin"
                required>
            </div>

            <div class="col-md-4">
              <label for="kejang" class="form-label">Apakah Ibu Mengalami Kejang?</label>
              <select class="form-select" id="kejang" name="kejang" required>
                <option value="0">Tidak</option>
                <option value="1">Ya</option>
              </select>
            </div>
          </div>

          <div class="d-grid mt-5">
            <button type="submit" class="btn btn-blue-gradient btn-lg">CEK RISIKO SEKARANG</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}

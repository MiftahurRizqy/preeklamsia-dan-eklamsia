{% extends "core/base.html" %}

{% block title %}Cek Risiko Preeklamsia{% endblock %}

{% block content %}
<style>
  .risk-wrapper {
    margin-top: 80px;
    margin-bottom: 80px;
  }

  .risk-card {
    background: radial-gradient(circle at top left, rgba(252, 231, 243, 0.9), transparent 55%),
      radial-gradient(circle at bottom right, rgba(254, 249, 195, 0.85), transparent 55%),
      #ffffff;
    border-radius: 22px;
    border: 1px solid rgba(251, 113, 133, 0.3);
    box-shadow: 0 22px 60px rgba(251, 113, 133, 0.35);
    backdrop-filter: blur(8px);
    transform: translateY(24px);
    opacity: 0;
    animation: cardIn 0.9s ease-out forwards;
    padding-bottom: 3rem;
  }

  .risk-subtitle {
    color: #7f1d3a;
    font-size: 0.95rem;
  }

  .pill-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(251, 113, 133, 0.08);
    border: 1px solid rgba(251, 113, 133, 0.4);
    color: #be123c;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .form-label {
    color: #7f1d3a;
    font-weight: 600;
  }

  .form-control,
  .form-select {
    background-color: #fff7fb;
    border: 1px solid rgba(251, 113, 133, 0.4);
    color: #4a1c31;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: rgba(236, 72, 153, 0.9);
    box-shadow: 0 0 0 0.18rem rgba(244, 114, 182, 0.35);
  }

  .field-group-title {
    font-weight: 700;
    color: #be123c;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
  }

  .btn-pink-gradient {
    background-image: linear-gradient(120deg, #fb7185, #ec4899, #e879f9);
    border: none;
    color: #fffdf7;
    font-weight: 700;
    letter-spacing: 0.03em;
    box-shadow: 0 14px 38px rgba(236, 72, 153, 0.7);
    transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
  }

  .btn-pink-gradient:hover {
    transform: translateY(-1px) scale(1.02);
    box-shadow: 0 20px 50px rgba(236, 72, 153, 0.9);
  }

  @keyframes cardIn {
    from {
      opacity: 0;
      transform: translateY(35px) scale(0.98);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>

<div class="container risk-wrapper">
  <div class="row justify-content-center">
    <div class="col-lg-11 col-xl-10">
      <div class="risk-card p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div>
            <span class="pill-tag">
              <i class="bi bi-heart-pulse-fill"></i>
              Cek Risiko
            </span>
          </div>
          <small class="risk-subtitle">Isi data klinis ibu hamil dengan lengkap untuk analisis yang lebih
            akurat.</small>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'predict_result' %}">
          {% csrf_token %}

          <div class="row g-3 mt-2">
            <div class="col-md-4">
              <label for="usia" class="form-label">Usia Ibu (tahun)</label>
              <input type="number" step="1" min="10" max="60" class="form-control" id="usia" name="usia" required>
            </div>
            <div class="col-md-4">
              <label for="gravida" class="form-label">Gravida</label>
              <input type="number" step="1" min="0" class="form-control" id="gravida" name="gravida" required>
            </div>
            <div class="col-md-4">
              <label for="para" class="form-label">Para</label>
              <input type="number" step="1" min="0" class="form-control" id="para" name="para" required>
            </div>
            <div class="col-md-4">
              <label for="abortus" class="form-label">Abortus</label>
              <input type="number" step="1" min="0" class="form-control" id="abortus" name="abortus" required>
            </div>

            <div class="col-md-4">
              <label for="usia_kehamilan" class="form-label">Usia Kehamilan (minggu)</label>
              <input type="number" step="1" min="1" max="42" class="form-control" id="usia_kehamilan"
                name="usia_kehamilan" required>
            </div>
            <div class="col-md-4">
              <label for="tinggi_badan" class="form-label">Tinggi Badan (cm)</label>
              <input type="number" step="1" min="120" max="200" class="form-control" id="tinggi_badan"
                name="tinggi_badan" required>
            </div>
            <div class="col-md-4">
              <label for="berat_badan" class="form-label">Berat Badan (kg)</label>
              <input type="number" step="0.1" min="30" max="200" class="form-control" id="berat_badan"
                name="berat_badan" required>
            </div>

            <div class="col-md-4">
              <label for="sistolik" class="form-label">Tekanan Darah Sistolik (mmHg)</label>
              <input type="number" step="1" min="80" max="220" class="form-control" id="sistolik" name="sistolik"
                required>
            </div>
            <div class="col-md-4">
              <label for="diastolik" class="form-label">Tekanan Darah Diastolik (mmHg)</label>
              <input type="number" step="1" min="40" max="140" class="form-control" id="diastolik" name="diastolik"
                required>
            </div>

            <div class="col-md-4">
              <label for="hemoglobin" class="form-label">Kadar Hemoglobin (g/dL)</label>
              <input type="number" step="0.1" min="5" max="20" class="form-control" id="hemoglobin" name="hemoglobin"
                required>
            </div>

            <div class="col-md-4">
              <label for="kejang" class="form-label">Apakah Ibu Mengalami Kejang?</label>
              <select class="form-select" id="kejang" name="kejang" required>
                <option value="0">Tidak</option>
                <option value="1">Ya</option>
              </select>
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-pink-gradient btn-lg">CEK RISIKO</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
